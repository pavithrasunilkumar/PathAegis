version: '3.9'

services:
  backend:
    build: ./backend
    container_name: pathaegis-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - pathaegis-db:/app/data
    environment:
      - SECRET_KEY=change-this-in-production-please
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: pathaegis-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pathaegis-db:
